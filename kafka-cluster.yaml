apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: dual-role-nodes
  namespace: strimzi-kafka
  labels:
    strimzi.io/cluster: dev-cluster
spec:
  replicas: 3
  roles:
    - controller
    - broker
  resources:
    requests:
      cpu: "250m"
      memory: 1Gi
    limits:
      cpu: "250m"
      memory: 1Gi
  storage:
    type: ephemeral


---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: dev-cluster
  namespace: strimzi-kafka

spec:
  kafka:
    version: 4.1.0
    metadataVersion: 4.1-IV0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 3
      min.insync.replicas: 2
  entityOperator:
    topicOperator: {}
    userOperator: {}
